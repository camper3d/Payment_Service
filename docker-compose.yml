services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payment_network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: payment_user
      RABBITMQ_DEFAULT_PASS: payment_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payment_network

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://payment_user:payment_pass@postgres:5432/payment_db
      RABBITMQ_URL: amqp://payment_user:payment_pass@rabbitmq:5672/
      API_KEY: test-api-key-123
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - payment_network

  outbox_worker:
    build: .
    command: python scripts/run_worker.py
    environment:
      DATABASE_URL: postgresql+asyncpg://payment_user:payment_pass@postgres:5432/payment_db
      RABBITMQ_URL: amqp://payment_user:payment_pass@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    networks:
      - payment_network

  payment_consumer:
    build: .
    command: python scripts/run_consumer.py
    environment:
      DATABASE_URL: postgresql+asyncpg://payment_user:payment_pass@postgres:5432/payment_db
      RABBITMQ_URL: amqp://payment_user:payment_pass@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    networks:
      - payment_network

volumes:
  postgres_data:

networks:
  payment_network:
    driver: bridge